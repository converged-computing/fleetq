# A small local Kubernetes cluster for fleetq dispatch testing.
#   kind create cluster --config .devcontainer/kind-config.yaml
# creates the cluster and a kubeconfig context named `kind-fleetq`. Register a
# fleetq cluster against it with:
#   fleetq cluster register --name k8s --manager k8s-job --config context=kind-fleetq
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: fleetq
nodes:
  - role: control-plane
  - role: worker
  - role: worker
name: Fluxion

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FLUX_IMAGE: vanessa/fluxion-quantum:latest

jobs:
  fluxion:
    name: real matcher (-tags fluxion)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker pull "$FLUX_IMAGE"
      - name: make fluxion-test
        run: |
          docker run --rm -v "$PWD":/src -w /src "$FLUX_IMAGE" bash -lc '
            export PATH=$PATH:/usr/local/go/bin GOFLAGS=-buildvcs=false
            go version
            make fluxion-test
          '

  fluxcore:
    name: real dispatch (-tags fluxcore)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker pull "$FLUX_IMAGE"
      - name: make fluxcore-test   # spins up a broker via `flux start` and submits real jobs
        run: |
          docker run --rm -v "$PWD":/src -w /src "$FLUX_IMAGE" bash -lc '
            export PATH=$PATH:/usr/local/go/bin GOFLAGS=-buildvcs=false
            make fluxcore-test
          '

  all:
    name: combined build (-tags fluxion,fluxcore)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker pull "$FLUX_IMAGE"
      - name: make all   # links the real matcher AND libflux dispatch into one binary
        run: |
          docker run --rm -v "$PWD":/src -w /src "$FLUX_IMAGE" bash -lc '
            export PATH=$PATH:/usr/local/go/bin GOFLAGS=-buildvcs=false
            make all
            test -x bin/fleetq
          '
